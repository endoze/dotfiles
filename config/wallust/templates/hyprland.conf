# Hyprland border colors generated by wallust.
# Sourced from config/hypr/hyprland.conf via ~/.cache/wallust/hyprland.conf;
# Hyprland hot-reloads this file on change, so no manual reload is needed.

general {
    # `saturate` punches up the border colors so they grab attention regardless
    # of the wallpaper's scheme; `strip` drops the leading # for rgb()/rgba().
    col.active_border = rgb({{color1 | saturate(0.6) | strip}}) rgb({{color2 | saturate(0.6) | strip}}) rgb({{color3 | saturate(0.6) | strip}}) rgb({{color4 | saturate(0.6) | strip}}) rgb({{color5 | saturate(0.6) | strip}}) rgb({{color6 | saturate(0.6) | strip}})
    # color0 is almost the background color; ee alpha makes the inactive border
    # nearly transparent.
    col.inactive_border = rgba({{color0 | strip}}ee)
}
