# vim: ft=hyprlang

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Q, killactive,
bind = $mainMod, T, exec, $terminal
bind = $mainMod, F, exec, $browser
bind = $mainMod, M, exec, loginctl lock-session
# Quickshell image-carousel wallpaper picker (replaced waypaper / walker -m wallpaper):
bind = $mainMod, P, exec, wallpaper-picker
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, S, exec, $steam
bind = $mainMod, C, exec, ~/.config/hypr/scripts/clipboard.sh copy
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard.sh paste
bind = $mainMod, X, exec, ~/.config/hypr/scripts/clipboard.sh cut
bind = $mainMod, D, exec, ps aux | grep '.[D]iscord-wrapped' && hyprctl dispatch togglespecialworkspace discord || $discord
bind = $mainMod, SPACE, exec, $menu
bind = CONTROL ALT, V, exec, walker -m clipboard

bind = $mainMod CONTROL, 3, exec, hyprshot -m output
bind = $mainMod CONTROL, 4, exec, hyprshot -m region
bind = $mainMod CONTROL, 5, exec, ~/.config/hypr/scripts/screenrecord.sh
bind = $mainMod CONTROL, 6, exec, ~/.config/hypr/scripts/screenrecord.sh slurp
bind = $mainMod CONTROL, 7, exec, ~/.config/hypr/scripts/wallpaper-video.sh

bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod SHIFT, I, exec, ~/.config/hypr/scripts/pip.sh
bind = $mainMod CONTROL, H, exec, ~/.config/hypr/scripts/hdr-toggle.sh
bind = $mainMod SHIFT, R, exec, hyprctl reload && eww reload

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, G, togglespecialworkspace, magic
bind = $mainMod SHIFT, G, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, ~/.config/eww/scripts/volume-osd.sh raise
bindel = ,XF86AudioLowerVolume, exec, ~/.config/eww/scripts/volume-osd.sh lower
bindel = ,XF86AudioMute, exec, ~/.config/eww/scripts/volume-osd.sh mute
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
