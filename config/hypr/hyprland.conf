# vim: ft=hyprlang

monitor = desc:Acer Technologies Acer X27 ##ASOSpDuqCRrd,3840x2160@144,0x0,1.5
monitor = , preferred, auto, 1

source = ~/.config/hypr/configs/env.conf

$terminal = ghostty --font-size=18
$fileManager = env GSK_RENDERER=ngl nautilus --no-desktop
$menu = walker
$browser = firefox
$discord = discord
$steam = env STEAM_FORCE_DESKTOPUI_SCALING=2.0 steam -compat-force-slr off

source = ~/.config/hypr/configs/startup.conf
source = ~/.config/hypr/configs/keybinds.conf
source = ~/.config/hypr/configs/window.conf
source = ~/.config/hypr/configs/inputs.conf
source = ~/.config/hypr/configs/animations.conf

# Matugen generated colors (if file exists, it will override the colors below)
source = ~/.cache/matugen/hyprland.conf

ecosystem {
  enforce_permissions = false
  no_update_news = true
  no_donation_nag = true
}

general {
  gaps_in = 5
  gaps_out = 10

  border_size = 2

  resize_on_border = false

  allow_tearing = false

  layout = dwindle
}

xwayland {
  force_zero_scaling = true
}

cursor {
  no_hardware_cursors = true
}

debug {
  disable_logs = false
  enable_stdout_logs = true
}

decoration {
  rounding = 10

  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 1

    vibrancy = 0.1696
  }
}

dwindle {
  preserve_split = true
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
  disable_hyprland_logo = true
  disable_splash_rendering = true
  vrr = 2

}
