# sops-nix configuration
# Secrets are encrypted with age keys defined here

keys:
  # dosvec server
  - &dosvec age1k86acr23u57gppgvuawe6usssm9njurknzdjue2lstuvscg4uakqkcu7p6
  # deadmau5 desktop
  - &deadmau5 age1gqesde5uj5jxycwl0uesknmnn70djpnjxqe3qdqmvshassf4yvjqsrdzj5
  # workmac
  - &workmac age1t8upu7yg2xd8p4yksvh6uml39asxjjr4tlcf0t3vuefrh9uq29hs7qp58l
  # archimedes router
  - &archimedes age1hr028x348p7k8m9f2wnnrmawqq2tfz78yh5h8cm23nag25k5jqxspcgl42
  # macbook
  - &macbook age1h3mddykwfdnnnh2vrxulznwkqklvzxqhw7edvr0fq0klrumyj33s249yvg

creation_rules:
  # NixOS system secrets for dosvec
  - path_regex: secrets/dosvec\.enc\.yaml$
    key_groups:
      - age:
          - *dosvec

  # NixOS system secrets for archimedes
  - path_regex: secrets/archimedes\.enc\.yaml$
    key_groups:
      - age:
          - *archimedes

  # Shared secrets (accessible by all machines with age keys)
  - path_regex: secrets/shared\.enc\.yaml$
    key_groups:
      - age:
          - *dosvec
          - *deadmau5
          - *workmac
          - *archimedes
          - *macbook
